name: Automated APK Compare Tool

on:
  workflow_dispatch: # מאפשר הפעלה ידנית דרך הממשק של גיטהאב

jobs:
  compare-apks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Apktool
        run: |
          sudo curl -L https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -o /usr/local/bin/apktool.jar
          sudo curl -L https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool -o /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool /usr/local/bin/apktool.jar

      - name: Download APKs
        run: |
          echo "Downloading Original APK..."
          wget -O original.apk "https://github.com/lilor159357/apk-compare/releases/download/v.1/original.apk"
          
          echo "Downloading Modified APK..."
          wget -O modified.apk "https://github.com/lilor159357/apk-compare/releases/download/v.1/modified.apk"

      - name: Decompile Original APK
        run: apktool d -f original.apk -o original_apk_dir

      - name: Decompile Modified APK
        run: apktool d -f modified.apk -o modified_apk_dir

      - name: Prepare Unified Directories & Compare
        run: |
          echo "Step 1: Creating unified directories..."
          mkdir -p unified_original/smali unified_modified/smali

          echo "Step 2: Copying all non-smali files (resources, manifest, etc.)..."
          rsync -a --exclude='smali*' original_apk_dir/ unified_original/
          rsync -a --exclude='smali*' modified_apk_dir/ unified_modified/

          echo "Step 3: Merging all smali folders into a single pool..."
          for dir in original_apk_dir/smali*; do
            if [ -d "$dir" ]; then rsync -a "$dir"/ unified_original/smali/; fi
          done

          for dir in modified_apk_dir/smali*; do
            if [ -d "$dir" ]; then rsync -a "$dir"/ unified_modified/smali/; fi
          done

          echo "Step 4: Comparing unified directories..."
          # || true ensures the workflow doesn't fail just because differences were found
          diff -urN unified_original unified_modified > smart_changes.patch || true

      - name: Split Diffs and Generate Index
        run: |
          echo "Generating a simple text list of modified files..."
          grep "^diff -urN " smart_changes.patch | awk '{print $4}' | sed 's|unified_modified/||g' > changed_classes_list.txt

          echo "Splitting massive patch into per-class patches..."
          mkdir -p per_class_diffs
          awk '
          /^diff -urN / {
              filepath = $4;
              sub("unified_modified/", "", filepath);
              filename = filepath;
              gsub("/", ".", filename);
              outfile = "per_class_diffs/" filename ".patch";
          }
          {
              if (outfile != "") print $0 >> outfile;
          }' smart_changes.patch

      - name: Upload Smart AI-Ready Logs
        uses: actions/upload-artifact@v4
        with:
          name: ai-ready-smali-diffs
          path: |
            smart_changes.patch
            changed_classes_list.txt
            per_class_diffs/
